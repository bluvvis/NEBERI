apiVersion: v1
kind: Service
metadata:
  name: {{ include "neberi.fullname" . }}-postgres
  labels:
    {{- include "neberi.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "neberi.name" . }}
    app.kubernetes.io/component: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: pg
