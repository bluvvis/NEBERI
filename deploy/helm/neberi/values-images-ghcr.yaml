# Образы после успешного GitHub Actions «Build and push images» для org/user bluvvis.
# Пакеты в GHCR сделайте Public: https://github.com/bluvvis?tab=packages
#
# Actions пушит два тега: latest и sha-XXXXXXX (7 символов коммита). Скрипт Deploy-Team11.ps1 по умолчанию
# ставит sha-*, чтобы кластер не залипал на старом digest у :latest.
#
# pullPolicy: Always — подстраховка при смене тега.
api:
  image:
    repository: ghcr.io/bluvvis/neberi-api
    tag: latest
    pullPolicy: Always
web:
  image:
    repository: ghcr.io/bluvvis/neberi-web
    tag: latest
    pullPolicy: Always
