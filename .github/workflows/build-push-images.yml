# Собирает образы API и Web и публикует в ghcr.io (бесплатно для публичных пакетов).
# После успешного запуска в кластере: helm upgrade ... --set api.image.repository=ghcr.io/<owner>/neberi-api ...
name: Build and push images

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

concurrency:
  group: build-push-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (api)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/neberi-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker meta (web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/neberi-web
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          build-args: |
            VITE_INGEST_API_KEY=neberi-dev-docker-ingest
            VITE_API_BASE=
          cache-from: type=gha
          cache-to: type=gha,mode=max
