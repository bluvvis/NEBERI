<!doctype html>
<html lang="ru">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("neberi-theme");
          document.documentElement.classList.toggle("dark", t === "dark");
        } catch (e) {
          /* по умолчанию светлая тема */
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NeBeri</title>
    <link rel="icon" type="image/png" href="/mts_logo.png" />
    <link rel="apple-touch-icon" href="/mts_logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
