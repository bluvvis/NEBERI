server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Точное совпадение для коллекции /v1/events (GET/POST/DELETE без хвоста).
    location = /v1/events {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # Хэшированные бандлы — долго в кэше; index.html — нет (иначе после деплоя виден старый JS).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Любая выдача index.html (в т.ч. после try_files) — без кэша, иначе после деплоя тянется старый бандл.
    location = /index.html {
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        # Без $uri/: для GET / не опираться на авто-index каталога — всегда явный fallback на index.html.
        try_files $uri /index.html;
        expires off;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }
}
